spring.application.name=ecommerce_clase_11
# ---------------------------------------------------------------
# Conexión a la base de datos MySQL (servidor de XAMPP)
# ---------------------------------------------------------------

# Dirección de la base de datos.
# jdbc:mysql:// → protocolo para conectarse a MySQL desde Java.
# localhost → el servidor está en nuestra propia máquina.
# 3306 → puerto por defecto de MySQL.
# ecommerce → nombre de la base que creamos a mano antes de levantar la app.
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce

# Usuario con el que entramos a MySQL. En XAMPP, por defecto es "root".
spring.datasource.username=root

# Contraseña del usuario. En XAMPP, root no tiene contraseña: queda vacía.
spring.datasource.password=

# Driver: el "traductor" que permite que Java hable con MySQL.
# Spring lo usa internamente para enviar y recibir datos de la base.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------------------------------------------------------------
# Configuración de JPA e Hibernate
# ---------------------------------------------------------------

# Qué hace Hibernate con las tablas al arrancar la app.
# update → compara nuestras entidades con la base y crea o ajusta las
#          tablas si hace falta. Si la tabla no existe, la crea.
#          Nunca borra datos que ya estaban guardados.
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola el SQL que Hibernate genera por detrás.
# Sirve para ver qué está haciendo Spring sin que lo escribamos nosotros.
spring.jpa.show-sql=true

# Acomoda ese SQL de la consola con saltos de línea e indentación,
# para que sea más fácil de leer.
spring.jpa.properties.hibernate.format_sql=true

# Dialecto: le dice a Hibernate que genere SQL compatible con MySQL.
# Cada motor de base de datos (MySQL, PostgreSQL, etc.) tiene su variante.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect